name: Swift CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Run test suite
        run: swift test

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Run format lint
        run: swift format lint -r -s Sources/ Tests/
